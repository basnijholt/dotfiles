[defaults]
llm-provider = "openai" # "ollama"

# Ollama
llm-ollama-model = "gpt-oss:20b"
llm-ollama-host = "http://192.168.1.5:11434"

# llama.cpp
llm-openai-model = "gpt-oss-low:20b"
openai-base-url = "http://192.168.1.5:9292/v1"

# Other
# asr-wyoming-ip = "localhost"
asr-wyoming-ip = "192.168.1.5"
# asr-wyoming-port = 10302
tts-wyoming-ip = "192.168.1.5"
tts-kokoro-host = "http://192.168.1.5:8880/v1"
tts-kokoro-voice = "af_bella(1)+af_nicole(1.5)"
wake-server-ip = "192.168.1.5"
input-device-name = "q9,brio,logitech,airpods,macbook"
output-device-name = "iloud,airpods,dell,macbook"

# RAG / memory
embedding-model = "embeddinggemma:300m"

[transcribe]
extra-instructions = """
The speaker is Bas Nijholt (pronounced "boss nigh-holt").
Proper nouns: Bas Nijholt, pipefunc, agent-cli, IonQ, Claude Code.
Assume the user is often discussing Python programming.
Use backticks for variable names, function names, and other code elements.
Follow PEP8: use `snake_case` for variables, functions, and package names; `CamelCase` for classes.
Other frequent words are `pipefunc` (a Python package), agent-cli (a Python package), IonQ (a quantum computing company), trapped-ion quantum computer, `pre-commit`, `pytest`, `ruff`, `unidep`.
Very frequently asking questions. If it sounds like a question add ?
"""
transcription-log = "~/transcription.log"

[dev]
branch_name_mode = "ai"

[dev.agent_args]
claude = ["--dangerously-skip-permissions"]
codex = ["--dangerously-bypass-approvals-and-sandbox"]

[dev.agent_env.claude]
CLAUDE_CODE_USE_VERTEX = "1"
# [1m] suffix enables 1M context window (Claude Code strips it before sending to Vertex).
# On Vertex the `opus` alias still resolves to 4.6, so we pin the version explicitly.
ANTHROPIC_MODEL = "claude-opus-4-7[1m]"
# Route Opus 4.7 via the Vertex *global* endpoint instead of us-east5.
# Global has its own (much larger) quota pool, gets new models first, and skips the
# regional price premium. us-east5 was returning 429 RESOURCE_EXHAUSTED on the
# per-region online_prediction_input_tokens_per_minute_per_base_model quota.
VERTEX_REGION_CLAUDE_4_7_OPUS = "global"
# ANTHROPIC_SMALL_FAST_MODEL is deprecated; use ANTHROPIC_DEFAULT_HAIKU_MODEL instead.
ANTHROPIC_DEFAULT_HAIKU_MODEL = "claude-haiku-4-5"
# Note: ANTHROPIC_API_KEY in the parent shell overrides CLAUDE_CODE_USE_VERTEX and
# routes requests to api.anthropic.com ("API Usage Billing" header). Setting the var
# to "" via TOML does NOT fix it (Claude Code treats empty as set).
